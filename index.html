<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Life: Карта Миров</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #1a1b26; color: #a9b1d6; margin: 0; padding: 0; text-align: center; }
        
        /* Хедер с балансом и маленькой колбой */
        header { position: fixed; top: 0; right: 0; width: 100%; display: flex; justify-content: flex-end; align-items: center; padding: 10px; background: rgba(26, 27, 38, 0.9); backdrop-filter: blur(5px); z-index: 100; border-bottom: 1px solid #414868; }
        #money_display { font-size: 1.1rem; color: #c0caf5; margin-right: 15px; }
        
        /* Маленькая колба уровня */
        .lvl-flask { width: 30px; height: 60px; border: 2px solid #565f89; border-radius: 0 0 15px 15px; overflow: hidden; position: relative; }
        .lvl-liquid { position: absolute; bottom: 0; left: 0; width: 100%; background: #4fd6be; transition: height 0.3s ease; }
        .lvl-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-weight: bold; font-size: 1.2rem; }

        /* Контейнер карты */
        .map-container { position: relative; width: 100vw; height: 100vh; overflow: auto; margin-top: 80px; padding-bottom: 20px; }
        
        /* SVG Карта (сама сеть квестов) */
        #rpg_map { width: 1500px; height: 1000px; border: 1px dashed #414868; }

        /* Стили для узлов (кружочков) карты */
        .node { stroke: #565f89; stroke-width: 2px; fill: #24283b; transition: r 0.3s ease; }
        .node:hover { stroke-width: 4px; stroke: #9ece6a; r: 15; }
        .node-easy { fill: #4fd6be; }
        .node-hard { fill: #f7768e; stroke: #f7768e; }
        .node-thesis { fill: #e0af68; stroke: #e0af68; stroke-width: 4px; }
        
        /* Стили для связей (линий) */
        .link { stroke: #414868; stroke-width: 1.5px; stroke-dasharray: 4; }

        /* Стили для текста под узлами */
        .node-label { fill: #c0caf5; font-size: 10px; }

        /* Панель добавления денег (скрытая) */
        #add_money_panel { position: fixed; bottom: -100px; left: 0; width: 100%; padding: 15px; background: rgba(36, 40, 59, 0.9); display: flex; gap: 10px; justify-content: center; transition: bottom 0.3s ease; z-index: 50; }
        input { width: 120px; padding: 10px; border: 1px solid #414868; border-radius: 8px; background: #24283b; color: white; }
        .btn-plus { background: none; border: 2px solid #4fd6be; color: #4fd6be; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div id="money_display">0.00 ₽</div>
        <div class="lvl-flask">
            <div id="lvl_liquid" class="lvl-liquid" style="height: 10%;"></div>
            <div id="lvl_text" class="lvl-text">L1</div>
        </div>
    </header>

    <div class="map-container">
        <svg id="rpg_map">
            <g id="links_group"></g>
            <g id="nodes_group"></g>
        </svg>
    </div>

    <div id="add_money_panel">
        <input type="number" id="money_input" placeholder="Сумма">
        <button class="btn" style="background: #22c55e;" onclick="addMoney()">Добавить +</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Данные квестов (для отрисовки карты)
        const questData = {
            mathEasy: [
                {id: 1, name: "План 1", x: 100, y: 300}, {id: 2, name: "Векторы 2", x: 200, y: 300},
                {id: 3, name: "Стер 3", x: 300, y: 300}, {id: 4, name: "Вер 4", x: 400, y: 300}
            ],
            mathHard: [
                {id: 13, name: "Триг 13", x: 550, y: 200}, {id: 15, name: "Нерав 15", x: 650, y: 200},
                {id: 18, name: "БОСС: Парам 18", x: 800, y: 150}
            ],
            thesis: [
                {id: 'T1', name: "ТЗ", x: 100, y: 600}, {id: 'T2', name: "Гл 1 (Теория)", x: 300, y: 600},
                {id: 'T3', name: "Гл 2 (Практика)", x: 500, y: 600}
            ]
        };

        const svgMap = document.getElementById('rpg_map');
        const nodesGroup = document.getElementById('nodes_group');
        const linksGroup = document.getElementById('links_group');

        // Функция отрисовки карты
        function drawMap() {
            // 1. Отрисовка базовых узлов (Easy)
            questData.mathEasy.forEach((q, i) => {
                createNode(q.x, q.y, q.name, 'node-easy', () => completeTask('math_easy', q.name));
                // Связи
                if(i > 0) createLink(questData.mathEasy[i-1].x, questData.mathEasy[i-1].y, q.x, q.y);
            });
            // ... (Аналогично отрисовать другие ветки и связи между ними)
        }

        // Вспомогательная функция для создания узла
        function createNode(x, y, name, classname, onClick) {
            let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x);
            circle.setAttribute("cy", y);
            circle.setAttribute("r", 10); // Радиус
            circle.setAttribute("class", "node " + classname);
            circle.onclick = onClick;
            nodesGroup.appendChild(circle);

            let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x);
            text.setAttribute("y", y + 20); // Смещение под кружочек
            text.setAttribute("class", "node-label");
            text.setAttribute("text-anchor", "middle");
            text.textContent = name;
            nodesGroup.appendChild(text);
        }

        function createLink(x1, y1, x2, y2) {
            let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("class", "link");
            linksGroup.appendChild(line);
        }

        // Логика квестов
        function completeTask(type, name) {
            tg.sendData(JSON.stringify({action: 'task', task_type: type, task_name: name}));
            tg.close();
        }

        // Логика денег
        function addMoney() {
            let amt = document.getElementById('money_input').value;
            if(!amt) return;
            tg.sendData(JSON.stringify({action: 'income', amount: parseFloat(amt)}));
            tg.close();
        }

        drawMap();
    </script>
</body>
</html>
