<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Life: Skill Tree</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hud">
        <div class="hud-left">
            <div class="level-badge" id="level_display">LVL 1</div>
            <div class="xp-container">
                <span id="xp_text">0 / 1000 XP</span>
                <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp_bar"></div></div>
            </div>
        </div>
        <div class="hud-right">
            <div class="flask-container"><div class="flask-liquid" id="flask_liquid"></div></div>
        </div>
    </header>

    <div id="skill_tree"></div>
    <div id="floating_text_container"></div>
    <button class="fab" onclick="toggleForm()">➕</button>
    
    <div class="quest-form" id="quest_form">
        <h3>Новый Квест</h3>
        <input type="text" id="q_name" placeholder="Название">
        <input type="number" id="q_xp" placeholder="XP" value="100">
        <select id="q_category">
            <option value="study">Учёба</option>
            <option value="work">Работа</option>
            <option value="course">Курс</option>
            <option value="boss">БОСС</option>
        </select>
        <button onclick="addNewQuest()">Добавить</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
